version: 2

models:
  - name: fct_conversation_outcomes
    description: >
      One row per classifiable conversation (generation, modification, diagnostic, consultation).
      Ghost, anomalous, diagnostic, lookup, and unknown conversations are excluded.
      Joins INT_CONVERSATION_TYPE + INT_CONVERSATION_METRICS + INT_CONVERSATION_OUTCOMES_RAW.
      Conversations without a classifier result have NULL outcome fields (is_classified = FALSE).
    columns:
      - name: conversation_id
        description: "Primary key. Foreign key to STG_CONVERSATIONS."
        tests:
          - unique
          - not_null

      - name: conversation_type
        description: "Type label from INT_CONVERSATION_TYPE."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['generation', 'modification', 'diagnostic', 'consultation']

      - name: is_classified
        description: "TRUE if a classifier result exists for this conversation."
        tests:
          - not_null

      - name: outcome
        description: "Classifier outcome label. NULL if not classified."

      - name: classified_as_type
        description: "conversation_type at time of classification. NULL if not classified."

      - name: classified_at
        description: "Timestamp of the most recent classification run. NULL if not classified."

      - name: prompt_version
        description: "Fingerprint of the classifier (prompt + model) that produced the winning row. Hash-derived in the Python classifiers; a new value means the scoring function changed. NULL if not classified."

      - name: model_version
        description: "Anthropic model used as judge for the winning row (e.g. claude-sonnet-4-6). NULL if not classified."

      - name: prompt_hash
        description: "Short SHA-256 of (model + prompt text) for the winning row. Embedded in prompt_version. NULL if not classified."

      - name: question_understanding
        description: "Rubric score 1-3. NULL if not classified."

      - name: resource_exhaustion
        description: "Rubric score 1-3. NULL if not classified."

      - name: answer_grounding
        description: "Rubric score 1-3. NULL if not classified."

      - name: actionability
        description: "Rubric score 1-3. NULL if not classified."

      - name: flag_dev_acknowledged
        description: "SQL output only. Whether querybot proactively noted dev environment limitations. NULL for consultation and unclassified rows."

      - name: reasoning
        description: "2-3 sentence classifier explanation. NULL if not classified."

      - name: char_count
        description: "Character count of the conversation content fed to the classifier."

      - name: total_turns
        description: "Total message turns in the conversation."

      - name: total_user_messages
        description: "Count of user message type rows."

      - name: run_count
        description: "Number of runs in the conversation."

      - name: total_cost_usd
        description: "Sum of API costs across all runs."

      - name: total_duration_ms
        description: "Sum of all run durations in milliseconds."

      - name: avg_run_duration_ms
        description: "Average run duration in milliseconds."

      - name: corpus_era
        description: "pre_prefetch or post_prefetch — indicates whether schema_prefetch tooling was available."

      - name: prefetch_call_count
        description: "Number of schema_prefetch tool calls."

      - name: first_prefetch_sequence
        description: "Sequence number of the first schema_prefetch call."

      - name: sql_write_count
        description: "Number of SQL files written."

      - name: non_sql_write_count
        description: "Number of non-SQL files written."

      - name: first_write_sequence
        description: "Sequence number of the first file write."

      - name: prefetch_to_write_gap
        description: "Sequence gap between first prefetch and first write."

      - name: execute_sql_count
        description: "Number of execute_sql tool calls."

      - name: execute_sql_success_count
        description: "Number of successful SQL executions."

      - name: permission_error_count
        description: "Number of OperationalError (DB permission) failures."

      - name: code_review_count
        description: "Number of code review tool calls."

      - name: code_review_score_first
        description: "Score from the first code review in the conversation."

      - name: code_review_score_last
        description: "Score from the last code review in the conversation."

      - name: code_review_score_delta
        description: "Difference between last and first code review score. Positive = improvement."

      - name: user_correction_count
        description: "Proxy count of user correction turns."

      - name: user_rejected_tool_count
        description: "Number of tool calls rejected by the user."

      - name: stale_doc_warning_count
        description: "Number of stale documentation warnings surfaced by the schema tool."

      - name: tool_use_error_count
        description: "Number of tool calls where is_error = TRUE (MCP layer failures)."

      - name: codebase_error_count
        description: "Number of codebase-related errors (ImportError, ModuleNotFoundError)."

      - name: has_generation_signal
        description: "Post-prefetch AND prefetch_call_count > 0."

      - name: has_sql_write
        description: "sql_write_count > 0."

      - name: has_non_sql_write
        description: "non_sql_write_count > 0."

      - name: has_execute_sql
        description: "execute_sql_count > 0."

      - name: has_user_interrupt
        description: "user_rejected_tool_count > 0."

      - name: learning_extracted
        description: "Whether the learning extraction pipeline has processed this conversation."

  - name: dim_classifier_version
    description: >
      Warehouse-native registry of LLM-as-judge classifier versions. One row per
      distinct (prompt_version, model, prompt_hash) observed in the raw classifier
      ledger. A new row indicates the scoring function changed (prompt or model).
      Use to audit which judge produced a set of scores and when each version ran.
    columns:
      - name: prompt_version
        description: "Classifier fingerprint (hash of model + prompt text). Primary key with model_version and prompt_hash."
        tests:
          - not_null
      - name: model_version
        description: "Anthropic model used as judge (e.g. claude-sonnet-4-6)."
      - name: prompt_hash
        description: "Short SHA-256 of (model + prompt text). Embedded in prompt_version."
      - name: first_conversation_type
        description: "First conversation_type seen for this version (consultation vs generation/modification)."
      - name: distinct_conversation_types
        description: "Number of distinct conversation_type values scored under this version."
      - name: first_classified_at
        description: "Earliest classification timestamp for this version."
      - name: last_classified_at
        description: "Most recent classification timestamp for this version."
      - name: total_classifications
        description: "Total classification rows written under this version (includes patch reruns)."
      - name: distinct_conversations
        description: "Distinct conversations scored under this version."
      - name: error_count
        description: "Number of failed classification rows (error IS NOT NULL) under this version."

  - name: fct_conversation_outcomes_history
    description: >
      One row per (conversation_id, prompt_version) — the cross-version companion
      to fct_conversation_outcomes. Keeps every classifier version's score for a
      conversation so outcome drift and rubric-score shifts can be compared across
      prompt/model versions. Within a version, the most recent run is kept.
    columns:
      - name: conversation_version_key
        description: "Surrogate key: MD5(conversation_id || '-' || prompt_version). Primary key."
        tests:
          - unique
          - not_null
      - name: conversation_id
        description: "Foreign key to STG_CONVERSATIONS. Not unique on its own — repeats per version."
        tests:
          - not_null
      - name: prompt_version
        description: "Classifier version that produced this score row."
        tests:
          - not_null
      - name: model_version
        description: "Anthropic model used as judge for this version."
      - name: prompt_hash
        description: "Short SHA-256 of (model + prompt text) for this version."
      - name: classified_as_type
        description: "conversation_type at time of classification."
      - name: classified_at
        description: "Timestamp of the kept run for this (conversation, version)."
      - name: outcome
        description: "Classifier outcome label for this version."
      - name: question_understanding
        description: "Rubric score 1-3. NULL for inconclusive outcomes."
      - name: resource_exhaustion
        description: "Rubric score 1-3. NULL for inconclusive outcomes."
      - name: answer_grounding
        description: "Rubric score 1-3. NULL for inconclusive outcomes."
      - name: actionability
        description: "Rubric score 1-3. NULL for inconclusive outcomes."
      - name: flag_dev_acknowledged
        description: "SQL output only. NULL for consultation, diagnostic, and inconclusive rows."
      - name: reasoning
        description: "Classifier explanation. NULL for inconclusive outcomes."
      - name: char_count
        description: "Character count of conversation content fed to the classifier."
      - name: error
        description: "Error message if this classification run failed. NULL on success."

  - name: fct_validation_runs
    description: >
      One row per (validation_run_id, conversation_id) — the cleaned view of the append-only
      validation ledger. Each row is one judge-vs-human comparison for a golden-set case at the
      prompt_version current when the run executed. Every run is kept (not collapsed to latest):
      the cross-run history is the drift signal. Errors (unparseable/API-failed classifications)
      are flagged via is_error and excluded from agreement, not treated as disagreements.
    columns:
      - name: validation_case_key
        description: "Surrogate key MD5(validation_run_id || '-' || conversation_id). Primary key."
        tests:
          - unique
          - not_null
      - name: validation_run_id
        description: "Identifier shared by all cases scored in one validation run."
        tests:
          - not_null
      - name: run_at
        description: "Timestamp of the validation run."
        tests:
          - not_null
      - name: conversation_id
        description: "Golden-set conversation that was scored."
        tests:
          - not_null
      - name: label_cohort
        description: "Immutable label cohort the case belongs to (from SEED_VALIDATION_LABELS)."
      - name: is_blind
        description: "TRUE if the case is a blind test (excluded from headline agreement)."
      - name: prompt_version
        description: "Classifier fingerprint (hash of model + prompt) at run time. The drift control variable."
        tests:
          - not_null
      - name: model_version
        description: "Anthropic model used as judge for this run."
      - name: prompt_hash
        description: "Short SHA-256 of (model + prompt text)."
      - name: expected_outcome
        description: "Human ground-truth outcome label (independent of the judge)."
      - name: actual_outcome
        description: "Judge's outcome label. NULL on error."
      - name: outcome_passed
        description: "TRUE if actual_outcome == expected_outcome."
      - name: is_scored
        description: "TRUE if the judge returned a parseable result (error IS NULL)."
      - name: is_error
        description: "TRUE if the classification failed (API/parse error). Excluded from agreement."
      - name: error
        description: "Error message if the run failed. NULL on success."
      - name: expected_question_understanding
        description: "Human rubric score 1-3. NULL until independently human-labeled (v2)."
      - name: actual_question_understanding
        description: "Judge rubric score 1-3. NULL on error."
      - name: question_understanding_abs_error
        description: "ABS(expected - actual). NULL when either side is missing."
      - name: expected_resource_exhaustion
        description: "Human rubric score 1-3. NULL until independently human-labeled (v2)."
      - name: actual_resource_exhaustion
        description: "Judge rubric score 1-3. NULL on error."
      - name: resource_exhaustion_abs_error
        description: "ABS(expected - actual). NULL when either side is missing."
      - name: expected_answer_grounding
        description: "Human rubric score 1-3. NULL until independently human-labeled (v2)."
      - name: actual_answer_grounding
        description: "Judge rubric score 1-3. NULL on error."
      - name: answer_grounding_abs_error
        description: "ABS(expected - actual). NULL when either side is missing."
      - name: expected_actionability
        description: "Human rubric score 1-3. NULL until independently human-labeled (v2)."
      - name: actual_actionability
        description: "Judge rubric score 1-3. NULL on error."
      - name: actionability_abs_error
        description: "ABS(expected - actual). NULL when either side is missing."
      - name: char_count
        description: "Character count of the conversation content fed to the judge. NULL on error."

  - name: fct_concept_drift
    description: >
      One row per (validation_run_id, prompt_version) — the judge-vs-human agreement time series
      and the project's concept-drift signal. Holding the golden set and prompt_version fixed, a
      drop in outcome_agreement_rate over time means the judge moved even though the prompt_version
      hash did not rotate (e.g. the model behind the claude-sonnet-4-6 alias changed). Baseline is
      the first run observed at each prompt_version; drift_band echoes the PSI 0.1/0.25 convention.
    columns:
      - name: validation_run_id
        description: "Identifier of the validation run. Primary key with prompt_version."
        tests:
          - not_null
      - name: prompt_version
        description: "Classifier fingerprint. A new value starts a new drift baseline by design."
        tests:
          - not_null
      - name: model_version
        description: "Anthropic model used as judge for this run."
      - name: prompt_hash
        description: "Short SHA-256 of (model + prompt text)."
      - name: run_at
        description: "Timestamp of the validation run."
        tests:
          - not_null
      - name: n_cases
        description: "Non-blind, scored (error-free) cases in this run — the agreement denominator."
      - name: n_passed
        description: "Non-blind scored cases where the judge matched the human label."
      - name: error_count
        description: "Cases that failed classification (API/parse error). Excluded from agreement."
      - name: n_blind_cases
        description: "Blind, scored cases in this run."
      - name: n_blind_passed
        description: "Blind scored cases where the judge matched the human label."
      - name: outcome_agreement_rate
        description: "n_passed / n_cases. Headline judge-vs-human agreement. NULL if no scored non-blind cases."
      - name: blind_agreement_rate
        description: "Agreement on blind cases, reported separately from the headline."
      - name: baseline_agreement_rate
        description: "outcome_agreement_rate of the earliest run at this prompt_version."
      - name: agreement_delta_vs_baseline
        description: "outcome_agreement_rate - baseline_agreement_rate. Negative = drift down."
      - name: drift_band
        description: "stable (<0.10) / moderate (<0.25) / significant (>=0.25) / unknown — by |delta|."
        tests:
          - accepted_values:
              arguments:
                values: ['stable', 'moderate', 'significant', 'unknown']
      - name: question_understanding_match_rate
        description: "Exact-match rate on the question_understanding rubric. NULL until human rubric labels exist."
      - name: question_understanding_mae
        description: "Mean absolute error on question_understanding. NULL until human rubric labels exist."
      - name: resource_exhaustion_match_rate
        description: "Exact-match rate on resource_exhaustion. NULL until human rubric labels exist."
      - name: resource_exhaustion_mae
        description: "Mean absolute error on resource_exhaustion. NULL until human rubric labels exist."
      - name: answer_grounding_match_rate
        description: "Exact-match rate on answer_grounding. NULL until human rubric labels exist."
      - name: answer_grounding_mae
        description: "Mean absolute error on answer_grounding. NULL until human rubric labels exist."
      - name: actionability_match_rate
        description: "Exact-match rate on actionability. NULL until human rubric labels exist."
      - name: actionability_mae
        description: "Mean absolute error on actionability. NULL until human rubric labels exist."
